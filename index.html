<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>AutoPosto - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="br-header">
        <div class="header-left">
            <span class="logo-text">Posto GSL</span>
        </div>
        <div class="header-right">
            <div class="nav-links">
                <a href="#">Abasteça com ▾</a>
                <a href="#">Pague com ▾</a>

            </div>

    <main class="app-container">
        <h2 class="logo-posto">Posto GSL</h2>
        <p class="tagline">Abastecimento rápido e com eficiencia </p>

            <label>CPF</label>

        <a href="abastecimento.html" class="btn-sistema">ACESSAR SISTEMA</a>
