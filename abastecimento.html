<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posto Fugaz - Abastecer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="br-header">
        <div class="header-left">
            <img src="icone/pf.png" alt="Logo Posto Fugaz" class="header-logo-img">
            <span class="logo-text">Posto Fugaz</span>
        </div>
        <div class="header-right">
            <div class="nav-links">
                <a href="#">Abasteça com ▾</a>
                <a href="#">Pague com ▾</a>
                <a href="#">Ganhe mais ▾</a>
            </div>
            <span class="status-dot">● Sistema Online</span>
        </div>
    </header>

    <main class="app-container">
        <h3 class="page-title">Escolha o Abastecimento</h3>
        <p class="instructions">Selecione um valor rápido para a sua bomba.</p>
        
        <div class="botoes-rapidos">
            <a href="#" class="btn-valor" onclick="definirValor(50)">R$ 50</a>
            <a href="#" class="btn-valor" onclick="definirValor(100)">R$ 100</a>
            <a href="#" class="btn-valor" onclick="definirValor(150)">R$ 150</a>
        </div>

        <div class="form-group">
            <label>Ou digite outro valor (R$):</label>
            <input type="number" id="campo-valor" class="input-field" placeholder="0,00">
            
            <label style="margin-top: 20px;">Forma de Pagamento:</label>
            <select id="metodo-pagamento" class="input-field" style="background-color: white; height: 50px;">
                <option value="pix">PIX (QR Code)</option>
                <option value="cartao">Cartão de Crédito / Débito</option>
            </select>
        </div>

        <a href="#" class="btn-sistema" onclick="irParaPagamento()">IR PARA O PAGAMENTO</a>
        <a href="index.html" class="btn-sistema" style="background-color: #334155; margin-top: 10px;">VOLTAR</a>
    </main>

    <script>
        function definirValor(valor) {
            document.getElementById('campo-valor').value = valor;
        }

        async function irParaPagamento() {
            const valorTotal = document.getElementById('campo-valor').value;
            const idClienteLogado = localStorage.getItem('id_cliente');
            const metodo = document.getElementById('metodo-pagamento').value;

            if (!idClienteLogado) {
                alert('Erro: Usuário não identificado. Faça o login novamente.');
                window.location.href = "index.html";
                return;
            }

            if (valorTotal <= 0) {
                alert('Por favor, selecione ou digite um valor para abastecer.');
                return;
            }

            try {
                const resposta = await fetch('http://localhost:5000/api/abastecer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_cliente: idClienteLogado, valor: valorTotal, metodo: metodo })
                });

                const resultado = await resposta.json();

                if (resultado.sucesso) {
                    localStorage.setItem('id_transacao_atual', resultado.id_transacao);
                    localStorage.setItem('valor_atual', valorTotal);

                    alert('Transação gerada com sucesso! Redirecionando...');
                    
                    if (metodo === "cartao") {
                        window.location.href = "cartao.html";
                    } else {
                        window.location.href = "pagamento.html";
                    }
                } else {
                    alert(resultado.mensagem);
                }
            } catch (erro) {
                alert('Erro de conexão. Verifique sua conexão com a internet.');
            }
        }
    </script>
</body>
</html>
